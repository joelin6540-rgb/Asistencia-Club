<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de asistencia</title>

<style>
body{
font-family: Arial, sans-serif;
text-align:center;
padding:40px;

background-image: url("/static/fondo_{{ club }}.png");
background-size: 250px;
background-repeat: repeat;
}

h2{
    margin-bottom:20px;
}

.lista{
    max-width:500px;
    margin:auto;
}

.alumno{
    display:block;
    margin:12px 0;
}

/* ocultamos el checkbox */
.alumno input{
    display:none;
}

/* tarjeta */
.tarjeta{
    display:block;
    padding:18px;
    border-radius:14px;
    background:white;
    border:2px solid #ddd;
    font-size:20px;
    transition:0.2s;
}

/* cuando está seleccionado */
.alumno input:checked + .tarjeta{
    background:#2d89ef;
    color:white;
    border-color:#2d89ef;
}

/* botón guardar */
button{
    margin-top:25px;
    padding:16px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2d89ef;
    color:white;
}

button:hover{
    background:#1b5fad;
}
</style>

</head>

<body>

<h2>Lista de asistencia</h2>

<button class="btn" onclick="history.back()">⬅ Atrás</button>

<form method="POST" action="/guardar/{{ club }}">

    <div style="margin-bottom:20px; font-size:20px;">
Fecha de la clase:<br>
<input type="date" name="fecha" value="{{fecha}}" style="font-size:18px; padding:8px;">
</div>

<div class="lista">

{% for alumno in alumnos %}

<label class="alumno">
<input type="checkbox" name="alumnos_presentes" value="{{ alumno }}">
<div class="tarjeta">
{{ alumno }}
</div>
</label>

{% endfor %}


</div>

<button type="submit">Guardar asistencia</button>

</form>

</body>
</html>
