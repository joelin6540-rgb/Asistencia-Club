<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de asistencia</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:40px;

display:flex;
flex-direction:column;
align-items:center;

background-image:url("{{ url_for('static', filename='fondo_{{club}}.png') }}");
background-size:260px;
background-repeat:repeat;
}

.card{
width:90%;
max-width:500px;
padding:30px;
border-radius:15px;
background:rgba(255,255,255,0.95);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:left;
}

h2{
text-align:center;
}

.btn{
display:block;
width:90%;
max-width:350px;
margin:20px auto;
padding:18px;
font-size:18px;
border-radius:10px;
border:none;
background:#2d7be5;
color:white;
font-weight:bold;
cursor:pointer;
}

.alumno{
margin:8px 0;
font-size:18px;
}

</style>

</head>

<body>

<div class="card">

<h2>Lista de asistencia</h2>

<button class="btn" onclick="history.back()">⬅ Atrás</button>

<form method="POST" action="/guardar/{{ club }}">

<div style="margin-bottom:20px; font-size:20px;">
Fecha de la clase:<br>
<input type="date" name="fecha" value="{{fecha}}" style="font-size:18px; padding:8px;">
</div>

<div class="lista">

{% for alumno in alumnos %}

<div class="alumno">

<label>

<input type="checkbox" name="alumnos_presentes" value="{{ alumno }}">

{{ alumno }}

</label>

</div>

{% endfor %}

</div>

<button class="btn" type="submit">Guardar asistencia</button>

</form>

</div>

</body>
</html>
