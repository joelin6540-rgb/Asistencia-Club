<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia guardada</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background-image:url("{{ url_for('static', filename='fondo_inicio.png') }}");
background-size:260px;
background-repeat:repeat;
}

.card{
width:90%;
max-width:500px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.95);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

.btn{
display:block;
width:90%;
max-width:350px;
margin:20px auto;
padding:18px;
font-size:18px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
background:#2d7be5;
}

.btn:hover{
background:#1f5fb8;
}

</style>

</head>

<body>

<div class="card">

<h1>✅ Asistencia guardada</h1>

<a class="btn" href="/asistencia/{{ club }}">Pasar otra lista</a>

<a class="btn" href="/">Volver al inicio</a>

</div>

</body>
</html>
