<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Selecciona club</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:20px;

display:flex;
justify-content:center;
align-items:center;
height:100vh;

background-image:url("{{ url_for('static', filename='fondo_inicio.png') }}");
background-size:200px;
background-repeat:repeat;
}

.card{

width:90%;
max-width:450px;

padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.96);

box-shadow:0 10px 25px rgba(0,0,0,0.25);

text-align:center;

}

h2{
margin-bottom:30px;
}

.btn{

display:block;

width:100%;
margin:15px 0;

padding:18px;

font-size:20px;

border:none;
border-radius:12px;

color:white;
font-weight:bold;

cursor:pointer;
text-decoration:none;

}

.tenis{
background:#4CAF50;
}

.basquet{
background:#FF7A00;
}

.estadisticas{
background:#2d7be5;
}

.btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="card">

<h2>Selecciona club</h2>

<a class="btn tenis" href="/club/tenis">
🎾 Tenis
</a>

<a class="btn basquet" href="/club/basquet">
🏀 Basquet
</a>

<br>

<a class="btn estadisticas" href="/estadisticas/tenis">
📊 Estadísticas Tenis
</a>

<a class="btn estadisticas" href="/estadisticas/basquet">
📊 Estadísticas Básquet
</a>

</div>

</body>
</html>
