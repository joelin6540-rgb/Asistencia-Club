<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de asistencia</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:40px;

display:flex;
flex-direction:column;
align-items:center;

background-image:url("{{ url_for('static', filename='fondo_' + club + '.png') }}");
background-size:200px;
background-repeat:repeat;
}

.card{
width:90%;
max-width:520px;
padding:30px;

border-radius:18px;
background:rgba(255,255,255,0.96);

box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-bottom:20px;
}

.btn{
display:block;
width:90%;
max-width:320px;

margin:15px auto;
padding:16px;

font-size:18px;
border-radius:10px;

border:none;

background:#2d7be5;
color:white;

font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#1f5fb8;
}

.fecha{
font-size:18px;
margin-bottom:20px;
}

input[type="date"]{
font-size:16px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.alumno-card{

display:flex;
align-items:center;
gap:14px;

background:white;

padding:16px;
margin:10px 0;

border-radius:15px;
border:2px solid #e7e7e7;

font-size:18px;

box-shadow:0 3px 10px rgba(0,0,0,0.08);

}

.alumno-card input{

transform:scale(1.3);

}

</style>

</head>

<body>

<div class="card">

<h2>Lista de asistencia</h2>

<button class="btn" onclick="history.back()">⬅ Atrás</button>

<form method="POST" action="/guardar/{{ club }}">

<div class="fecha">

Fecha de la clase:<br>

<input type="date" name="fecha" value="{{fecha}}">

</div>

{% for alumno in alumnos %}

<label class="alumno-card">

<input type="checkbox" name="alumnos_presentes" value="{{ alumno }}">

<span>{{ alumno }}</span>

</label>

{% endfor %}

<button class="btn" type="submit">

Guardar asistencia

</button>

</form>

</div>

</body>
</html>
