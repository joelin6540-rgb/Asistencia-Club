<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asistencia Club</title>

<style>

body{

margin:0;
padding:20px;

font-family:Arial, sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background-image:url("{{ url_for('static', filename='fondo_inicio.png') }}");
background-size:180px;
background-repeat:repeat;

}

.card{

width:90%;
max-width:480px;

background:rgba(255,255,255,0.95);

padding:30px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.25);

text-align:center;

backdrop-filter:blur(4px);

}

h1{

margin-bottom:30px;

font-size:34px;

}

.subtitulo{

margin-top:35px;
margin-bottom:15px;

font-size:22px;
font-weight:bold;

color:#333;

}

.btn{

display:block;

width:100%;

padding:18px;

margin-bottom:14px;

border:none;
border-radius:14px;

font-size:21px;
font-weight:bold;

color:white;
text-decoration:none;

transition:0.2s;

box-sizing:border-box;

}

.btn:hover{

transform:scale(1.02);

opacity:0.95;

}

.asistencia{

background:#43b649;

}

.estadisticas{

background:#2d7be5;

}

@media(max-width:600px){

.card{

width:95%;

padding:22px;

}

.btn{

font-size:18px;

padding:16px;

}

h1{

font-size:28px;

}

}

</style>
</head>

<body>

<div class="card">

<h1>🏫 Asistencia Club</h1>

<div class="subtitulo">
📋 Pasar asistencia
</div>

{% for clave, info in clubes.items() %}

<a class="btn asistencia"
href="/asistencia/{{ clave }}">

{{ info.emoji }} {{ info.nombre }}

</a>

{% endfor %}

<div class="subtitulo">
📊 Estadísticas
</div>

{% for clave, info in clubes.items() %}

<a class="btn estadisticas"
href="/estadisticas/{{ clave }}">

📊 {{ info.nombre }}

</a>

{% endfor %}

</div>

</body>
</html>
