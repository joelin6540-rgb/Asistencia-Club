<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:40px;
}

.bloque{
    margin:25px auto;
    width:80%;
    padding:20px;
    border-radius:15px;
    background:#f2f2f2;
    font-size:20px;
}

.volver{
    display:inline-block;
    margin-top:30px;
    padding:15px 25px;
    font-size:20px;
    border-radius:12px;
    background:#2d89ef;
    color:white;
    text-decoration:none;
}

</style>

</head>

<body>

<h1>📊 Estadísticas</h1>

{% for club in estadisticas %}

<div class="bloque">

<h2>{{club.nombre}}</h2>

Alumno con más faltas:<br>
<strong>{{club.peor}}</strong>

</div>

{% endfor %}

<a class="volver" href="/">⬅ Volver</a>

</body>
</html>
