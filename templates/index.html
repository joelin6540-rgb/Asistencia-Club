<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia Club</title>

<style>

align-items:center;

background-image:url("{{ url_for('static', filename='fondo_inicio.png') }}");
background-size:260px;
background-repeat:repeat;
}

.card{

.btn{

width:90%;

.tenis{

}

.basquet{

.est{

.btn:hover{

<body>

<div class="card">

<h1>Selecciona club</h1>

<a class="btn tenis" href="/asistencia/tenis">🎾 Tenis</a>

<a class="btn est" href="/estadisticas/tenis">📊 Estadísticas Tenis</a>

</html>
